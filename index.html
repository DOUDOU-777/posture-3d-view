<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>3D人体模型</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f8f7e4;
    }

    #tip {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 10;
      color: #29413E;
      font-size: 16px;
      background: rgba(255,255,255,0.9);
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 90%;
      word-break: break-all;
    }
  </style>
</head>

<body>
<div id="tip">页面已打开，准备启动3D程序...</div>

<script>
  window.addEventListener('error', function(e) {
    document.getElementById('tip').innerText = '全局错误：' + e.message;
  });

  window.addEventListener('unhandledrejection', function(e) {
    document.getElementById('tip').innerText = '模块加载失败：' + e.reason;
  });
</script>

<script type="importmap">
{
  "imports": {
    "three": "./libs/three.module.js"
  }
}
</script>

<script type="module">
  const tip = document.getElementById('tip');

  try {
    tip.innerText = '正在加载 three.module.js...';

    const THREE = await import('./libs/three.module.js?v=9001');

    tip.innerText = '正在加载 OrbitControls.js...';

    const controlsModule = await import('./libs/OrbitControls.js?v=9001');

    tip.innerText = '正在加载 GLTFLoader.js...';

    const loaderModule = await import('./libs/GLTFLoader.js?v=9001');

    const OrbitControls = controlsModule.OrbitControls;
    const GLTFLoader = loaderModule.GLTFLoader;

    tip.innerText = 'Three.js加载成功，正在创建场景...';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8f7e4);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 1.6, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(3, 5, 5);
    scene.add(dirLight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg') || 'normal';

    let targetColor = 0x72B09F;

    if (msg === 'hunchback') {
      targetColor = 0xE5533D;
    } else if (msg === 'neck_stain') {
      targetColor = 0xD99025;
    }

    tip.innerText = '正在加载 XBot.glb...';

    const loader = new GLTFLoader();

    loader.load(
      './XBot.glb?v=9001',

      function (gltf) {
        const model = gltf.scene;

        model.scale.set(3, 3, 3);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);
        model.position.y -= 1;

        model.traverse((child) => {
          if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
              color: targetColor,
              roughness: 0.5,
              metalness: 0.1
            });
          }
        });

        scene.add(model);
        tip.innerText = '模型加载完成，可拖动旋转';
      },

      function (xhr) {
        if (xhr.total) {
          const percent = Math.round((xhr.loaded / xhr.total) * 100);
          tip.innerText = '模型加载中：' + percent + '%';
        } else {
          tip.innerText = '模型正在加载...';
        }
      },

      function (error) {
        tip.innerText = '模型加载失败：' + error.message;
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

  } catch (err) {
    tip.innerText = '程序加载失败：' + err.message;
  }
</script>

</body>
</html>
