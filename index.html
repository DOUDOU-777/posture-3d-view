<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>3D人体模型</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f8f7e4;
    }

    #tip {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 10;
      color: #29413E;
      font-size: 16px;
      background: rgba(255,255,255,0.75);
      padding: 8px 12px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
<div id="tip">正在加载3D模型...</div>

<script type="module">
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js';
  import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js';
  import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js';

  const tip = document.getElementById('tip');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xf8f7e4);

  const camera = new THREE.PerspectiveCamera(
    45,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 1.4, 4);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
  dirLight.position.set(3, 5, 5);
  scene.add(dirLight);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(0, 1, 0);

  const params = new URLSearchParams(window.location.search);
  const msg = params.get('msg') || 'normal';

  let targetColor = 0x72B09F;
  if (msg === 'hunchback') {
    targetColor = 0xE5533D;
  } else if (msg === 'neck_stain') {
    targetColor = 0xD99025;
  }

  const loader = new GLTFLoader();

  loader.load(
    './XBot.glb',
    function (gltf) {
      const model = gltf.scene;

      model.position.set(0, -1, 0);
      model.scale.set(1.4, 1.4, 1.4);

      model.traverse((child) => {
        if (child.isMesh) {
          child.material = new THREE.MeshStandardMaterial({
            color: targetColor,
            roughness: 0.55,
            metalness: 0.05
          });
        }
      });

      scene.add(model);
      tip.innerText = '拖动屏幕可旋转模型';
    },
    function (xhr) {
      const percent = Math.round((xhr.loaded / xhr.total) * 100);
      tip.innerText = '模型加载中：' + percent + '%';
    },
    function (error) {
      console.error(error);
      tip.innerText = '模型加载失败，请检查 XBot.glb 路径';
    }
  );

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  animate();
</script>

</body>
</html>
