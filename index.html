<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>3D人体模型</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f8f7e4;
    }

    #tip {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 10;
      color: #29413E;
      font-size: 16px;
      background: rgba(255,255,255,0.9);
      padding: 8px 12px;
      border-radius: 10px;
    }
  </style>
</head>

<body>
<div id="tip">正在启动3D程序...</div>

<script src="./libs/three.min.js"></script>
<script src="./libs/OrbitControls.js"></script>
<script src="./libs/GLTFLoader.js"></script>

<script>
  const tip = document.getElementById('tip');

  if (typeof THREE === 'undefined') {
    tip.innerText = 'Three.js加载失败，请检查 three.min.js';
  } else {
    tip.innerText = 'Three.js已加载，正在加载模型...';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8f7e4);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 1.6, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(3, 5, 5);
    scene.add(dirLight);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg') || 'normal';

    let targetColor = 0x72B09F;

    if (msg === 'hunchback') {
      targetColor = 0xE5533D;
    } else if (msg === 'neck_stain') {
      targetColor = 0xD99025;
    }

    const loader = new THREE.GLTFLoader();

    loader.load(
      './XBot.glb',

      function (gltf) {
        const model = gltf.scene;

        model.scale.set(3, 3, 3);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);
        model.position.y -= 1;

        model.traverse(function (child) {
          if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
              color: targetColor,
              roughness: 0.5,
              metalness: 0.1
            });
          }
        });

        scene.add(model);
        tip.innerText = '模型加载完成，可拖动旋转';
      },

      function (xhr) {
        if (xhr.total) {
          const percent = Math.round((xhr.loaded / xhr.total) * 100);
          tip.innerText = '模型加载中：' + percent + '%';
        } else {
          tip.innerText = '模型正在加载...';
        }
      },

      function (error) {
        console.error(error);
        tip.innerText = '模型加载失败，请检查 XBot.glb';
      }
    );

    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  }
</script>

</body>
</html>
