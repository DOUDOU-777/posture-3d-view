<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>3D人体模型</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f8f7e4;
    }

    #tip {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 10;
      color: #29413E;
      font-size: 16px;
      background: rgba(255,255,255,0.9);
      padding: 8px 12px;
      border-radius: 10px;
    }

    #label {
      position: fixed;
      left: 20px;
      bottom: 24px;
      z-index: 10;
      color: #29413E;
      font-size: 16px;
      background: rgba(255,255,255,0.9);
      padding: 10px 14px;
      border-radius: 14px;
      font-weight: bold;
    }
  </style>
</head>

<body>
<div id="tip">正在启动3D程序...</div>
<div id="label">姿态状态：加载中</div>

<script src="./libs/three.min.js"></script>
<script src="./libs/OrbitControls.js"></script>
<script src="./libs/GLTFLoader.js"></script>

<script>
  const tip = document.getElementById('tip');
  const label = document.getElementById('label');

  if (typeof THREE === 'undefined') {
    tip.innerText = 'Three.js加载失败，请检查 three.min.js';
  } else {
    tip.innerText = 'Three.js已加载，正在加载模型...';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf8f7e4);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 1.6, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.8);
    dirLight.position.set(3, 5, 5);
    scene.add(dirLight);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const params = new URLSearchParams(window.location.search);
    const msg = params.get('msg') || 'normal';

    let targetColor = 0x72B09F;
    let markerColor = 0x72B09F;
    let statusText = '正常姿态';
    let markerPosition = null;

    if (msg === 'hunchback') {
      targetColor = 0xE5533D;
      markerColor = 0xFF2D2D;
      statusText = '驼背异常：背部高亮提示';
      markerPosition = new THREE.Vector3(0, 1.25, 0.35);
    } else if (msg === 'neck_stain') {
      targetColor = 0xD99025;
      markerColor = 0xFF9900;
      statusText = '颈部异常：颈部高亮提示';
      markerPosition = new THREE.Vector3(0, 1.95, 0.25);
    } else {
      targetColor = 0x72B09F;
      statusText = '正常姿态：未检测到异常部位';
    }

    label.innerText = '姿态状态：' + statusText;

    let marker = null;
    let markerHalo = null;

    function createMarker(position, color) {
      const markerGeometry = new THREE.SphereGeometry(0.12, 32, 32);
      const markerMaterial = new THREE.MeshBasicMaterial({
        color: color
      });

      marker = new THREE.Mesh(markerGeometry, markerMaterial);
      marker.position.copy(position);
      scene.add(marker);

      const haloGeometry = new THREE.SphereGeometry(0.22, 32, 32);
      const haloMaterial = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.25
      });

      markerHalo = new THREE.Mesh(haloGeometry, haloMaterial);
      markerHalo.position.copy(position);
      scene.add(markerHalo);

      const pointLight = new THREE.PointLight(color, 1.8, 2);
      pointLight.position.copy(position);
      scene.add(pointLight);
    }

    const loader = new THREE.GLTFLoader();

    loader.load(
      './XBot.glb',

      function (gltf) {
        const model = gltf.scene;

        model.scale.set(3, 3, 3);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);
        model.position.y -= 1;

        model.traverse(function (child) {
          if (child.isMesh) {
            child.material = new THREE.MeshStandardMaterial({
              color: targetColor,
              roughness: 0.5,
              metalness: 0.1
            });
          }
        });

        scene.add(model);

        if (markerPosition) {
          createMarker(markerPosition, markerColor);
        }

        tip.innerText = '模型加载完成，可拖动旋转';
      },

      function (xhr) {
        if (xhr.total) {
          const percent = Math.round((xhr.loaded / xhr.total) * 100);
          tip.innerText = '模型加载中：' + percent + '%';
        } else {
          tip.innerText = '模型正在加载...';
        }
      },

      function (error) {
        console.error(error);
        tip.innerText = '模型加载失败，请检查 XBot.glb';
      }
    );

    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    let pulse = 0;

    function animate() {
      requestAnimationFrame(animate);

      pulse += 0.04;

      if (marker && markerHalo) {
        const scale = 1 + Math.sin(pulse) * 0.18;
        marker.scale.set(scale, scale, scale);

        const haloScale = 1.2 + Math.sin(pulse) * 0.35;
        markerHalo.scale.set(haloScale, haloScale, haloScale);
        markerHalo.material.opacity = 0.18 + Math.abs(Math.sin(pulse)) * 0.18;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  }
</script>

</body>
</html>
