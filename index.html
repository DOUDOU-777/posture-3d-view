<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D人体模型</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f8f7e4; /* 你的小程序绿色风格 */
    }
  </style>
</head>
<body>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<!-- 控制器 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/OrbitControls.js"></script>

<!-- 模型加载器 -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
  // ===== 场景 =====
  const scene = new THREE.Scene();

  // ===== 相机 =====
  const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 1.5, 3);

  // ===== 渲染器 =====
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // ===== 光源 =====
  const light1 = new THREE.DirectionalLight(0xffffff, 1);
  light1.position.set(5, 5, 5);
  scene.add(light1);

  const light2 = new THREE.AmbientLight(0xaaaaaa);
  scene.add(light2);

  // ===== 控制器（可以拖动旋转）=====
  const controls = new THREE.OrbitControls(camera, renderer.domElement);

  // ===== 获取姿态参数 =====
  const params = new URLSearchParams(window.location.search);
  const msg = params.get("msg");

  // ===== 根据姿态设置颜色 =====
  let targetColor = 0x00ff00; // 默认绿色

  if (msg === "hunchback") {
    targetColor = 0xff4444; // 红（高风险）
  } else if (msg === "neck_stain") {
    targetColor = 0xffa500; // 橙（中风险）
  } else {
    targetColor = 0x22c55e; // 绿（正常）
  }

  // ===== 加载模型 =====
  const loader = new THREE.GLTFLoader();

  loader.load('./XBot.glb',
    function (gltf) {
      const model = gltf.scene;

      // 调整大小和位置
      model.scale.set(1, 1, 1);
      model.position.set(0, -1, 0);

      // 给整个模型换颜色
      model.traverse(function (child) {
        if (child.isMesh) {
          child.material = new THREE.MeshStandardMaterial({
            color: targetColor,
            roughness: 0.5,
            metalness: 0.2
          });
        }
      });

      scene.add(model);
    },
    undefined,
    function (error) {
      console.error("模型加载失败：", error);
    }
  );

  // ===== 自适应屏幕 =====
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ===== 动画 =====
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }

  animate();
</script>

</body>
</html>
